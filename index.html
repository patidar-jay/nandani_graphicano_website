<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nandani Graphicano</title>
    <!-- Fonts and Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://use.typekit.net/bqv5ngw.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
      (function() {
        try {
          const themeStr = localStorage.getItem('site_theme');
          if (themeStr) {
            const themeObj = JSON.parse(themeStr);
            const root = document.documentElement;
            if (themeObj.primaryColor) {
              const hexColor = themeObj.primaryColor;
              const r = parseInt(hexColor.slice(1, 3), 16);
              const g = parseInt(hexColor.slice(3, 5), 16);
              const b = parseInt(hexColor.slice(5, 7), 16);
              root.style.setProperty('--accent', hexColor);
              root.style.setProperty('--accent-rgb', r + ', ' + g + ', ' + b);
              root.style.setProperty('--accent-gradient', 'linear-gradient(135deg, ' + hexColor + ' 0%, rgba(' + r + ',' + g + ',' + b + ',0.8) 55%, rgba(' + r + ',' + g + ',' + b + ',0.6) 100%)');
              root.style.setProperty('--accent-glow', 'rgba(' + r + ', ' + g + ', ' + b + ', 0.1)');
            }
            if (themeObj.bgColor) {
              root.style.setProperty('--bg', themeObj.bgColor);
              root.style.setProperty('--card', themeObj.bgColor);
            }
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="error-log" style="color: red; padding: 20px; font-family: monospace; white-space: pre-wrap; z-index: 9999; position: absolute; background: white;"></div>
    <script>
      window.addEventListener('error', function(e) {
        document.getElementById('error-log').innerText += e.message + '\n' + e.filename + ':' + e.lineno + '\n\n';
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('error-log').innerText += e.reason + '\n\n';
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
